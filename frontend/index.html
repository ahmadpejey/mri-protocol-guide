<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRI Protocol Reference | Al-Islam Specialist Hospital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</head>

<body class="bg-zinc-950 text-zinc-300 antialiased selection:bg-blue-500/30" x-data="mriApp()" x-init="initApp()">

    <header class="bg-zinc-950 pt-4 pb-2 px-4 sticky top-0 z-50">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-zinc-100 tracking-tight font-sans">uMR580 Protocols</h1>
            <div class="text-[11px] uppercase tracking-wider text-zinc-500 font-semibold hidden sm:block">Al-Islam
                Specialist Hospital</div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto p-4">

        <div class="mb-6 relative group">
            <svg class="absolute left-4 top-3.5 h-5 w-5 text-zinc-500 group-focus-within:text-blue-400 transition-colors"
                fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <input type="text" x-model="searchQuery" placeholder="Search protocol or sequence..."
                class="w-full bg-zinc-900 rounded-full py-3.5 pl-12 pr-4 text-zinc-100 placeholder-zinc-500 outline-none focus:bg-zinc-800 focus:ring-2 focus:ring-blue-500/20 transition-all text-sm font-sans">
        </div>

        <div x-show="isLoading" class="flex justify-center items-center py-20">
            <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-400"></div>
        </div>

        <div x-show="!isLoading" class="space-y-4">

            <template x-for="group in filteredGroups" :key="group.GroupID">
                <div class="bg-zinc-900 rounded-[28px] overflow-hidden transition-all duration-300">

                    <button @click="toggleExpansion('openGroups', group.GroupID)"
                        class="w-full px-6 py-5 flex justify-between items-center hover:bg-zinc-800/50 transition-colors active:bg-zinc-800">
                        <h2 class="text-lg font-bold text-zinc-100 font-sans tracking-wide" x-text="group.GroupName">
                        </h2>
                        <div class="bg-zinc-800 rounded-full p-1.5">
                            <svg :class="{'rotate-180': openGroups.includes(group.GroupID)}"
                                class="w-5 h-5 text-zinc-400 spring-transform" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </div>
                    </button>

                    <div x-show="openGroups.includes(group.GroupID)" x-collapse x-cloak class="px-2 pb-2 space-y-2">

                        <div x-show="getProtocolsForGroup(group.GroupID).length === 0"
                            class="text-center py-4 text-zinc-500 text-sm italic font-sans">
                            No protocols found.
                        </div>

                        <template x-for="protocol in getProtocolsForGroup(group.GroupID)" :key="protocol.ProtocolID">
                            <div class="bg-zinc-800/40 rounded-[20px] overflow-hidden">

                                <button @click="toggleExpansion('openProtocols', protocol.ProtocolID)"
                                    class="w-full px-5 py-3.5 flex justify-between items-center hover:bg-zinc-800 transition-colors">
                                    <h3 class="text-[15px] font-semibold text-zinc-200 font-sans"
                                        x-text="protocol.ProtocolName"></h3>
                                    <svg :class="{'rotate-180': openProtocols.includes(protocol.ProtocolID)}"
                                        class="w-4 h-4 text-zinc-500 spring-transform" fill="none" stroke="currentColor"
                                        viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M19 9l-7 7-7-7"></path>
                                    </svg>
                                </button>

                                <div x-show="openProtocols.includes(protocol.ProtocolID)" x-collapse x-cloak
                                    class="px-2 pb-2">

                                    <template x-for="seq in getSequencesForProtocol(protocol.ProtocolID)"
                                        :key="seq.SeqID">
                                        <div
                                            class="w-full mb-1 last:mb-0 bg-zinc-950/30 rounded-2xl overflow-hidden border border-zinc-800/30">

                                            <button @click="toggleExpansion('openSequences', seq.SeqID)"
                                                class="w-full px-4 py-3 flex justify-between items-center hover:bg-zinc-800/80 transition-colors">
                                                <div class="flex items-center gap-3">
                                                    <span
                                                        class="text-[10px] font-bold bg-zinc-800 text-zinc-400 px-2 py-1 rounded-lg"
                                                        x-text="'#' + seq.Order"></span>
                                                    <span
                                                        class="font-medium text-blue-200/90 text-[13px] text-left uppercase tracking-wide"
                                                        x-text="seq.Name"></span>
                                                </div>
                                                <svg :class="{'rotate-180': openSequences.includes(seq.SeqID)}"
                                                    class="w-4 h-4 text-zinc-500 spring-transform shrink-0" fill="none"
                                                    stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round"
                                                        stroke-width="2" d="M19 9l-7 7-7-7"></path>
                                                </svg>
                                            </button>

                                            <div x-show="openSequences.includes(seq.SeqID)" x-collapse x-cloak
                                                class="p-4 grid md:grid-cols-2 gap-5 text-sm border-t border-zinc-800/50 bg-zinc-900/50">

                                                <div>
                                                    <div
                                                        class="text-zinc-500 text-[10px] font-sans font-bold uppercase tracking-widest mb-2">
                                                        Planning Guide</div>
                                                    <img :src="seq.PlanImageURL || 'https://via.placeholder.com/400x300/18181b/3f3f46.png?text=No+Image+Available'"
                                                        alt="Scout Plan"
                                                        class="w-full rounded-xl object-cover opacity-90">

                                                    <div class="mt-3 bg-blue-900/10 border border-blue-900/30 rounded-xl p-3 text-xs text-zinc-300"
                                                        x-show="seq.Notes">
                                                        <strong class="text-blue-300 font-sans block mb-1">Radiographer
                                                            Notes</strong>
                                                        <span x-text="seq.Notes" class="leading-relaxed"></span>
                                                    </div>
                                                </div>

                                                <div>
                                                    <div
                                                        class="text-zinc-500 text-[10px] font-sans font-bold uppercase tracking-widest mb-2">
                                                        Parameters</div>
                                                    <div
                                                        class="bg-zinc-950/50 rounded-xl overflow-hidden border border-zinc-800/50">
                                                        <table class="w-full text-left border-collapse text-[13px]">
                                                            <tbody class="divide-y divide-zinc-800/50">
                                                                <tr class="hover:bg-zinc-800/30 transition-colors">
                                                                    <td class="px-4 py-2.5 text-zinc-500 w-1/3">TR</td>
                                                                    <td class="px-4 py-2.5 text-blue-300 font-bold"
                                                                        x-text="resolveParam(seq, 'TR_Range', 'DefaultTR')">
                                                                    </td>
                                                                </tr>
                                                                <tr class="hover:bg-zinc-800/30 transition-colors">
                                                                    <td class="px-4 py-2.5 text-zinc-500">TE</td>
                                                                    <td class="px-4 py-2.5 text-blue-300 font-bold"
                                                                        x-text="resolveParam(seq, 'TE_Range', 'DefaultTE')">
                                                                    </td>
                                                                </tr>
                                                                <tr class="hover:bg-zinc-800/30 transition-colors">
                                                                    <td class="px-4 py-2.5 text-zinc-500">Thickness</td>
                                                                    <td class="px-4 py-2.5 text-zinc-300"
                                                                        x-text="seq.Thickness || '-'"></td>
                                                                </tr>
                                                                <tr class="hover:bg-zinc-800/30 transition-colors">
                                                                    <td class="px-4 py-2.5 text-zinc-500">Flip Angle
                                                                    </td>
                                                                    <td class="px-4 py-2.5 text-zinc-300"
                                                                        x-text="seq.Flip || '-'"></td>
                                                                </tr>
                                                                <tr class="hover:bg-zinc-800/30 transition-colors">
                                                                    <td class="px-4 py-2.5 text-zinc-500">Phase</td>
                                                                    <td class="px-4 py-2.5 text-zinc-300"
                                                                        x-text="seq.Phase || '-'"></td>
                                                                </tr>
                                                                <tr class="hover:bg-zinc-800/30 transition-colors">
                                                                    <td class="px-4 py-2.5 text-zinc-500">Matrix</td>
                                                                    <td class="px-4 py-2.5 text-zinc-300"
                                                                        x-text="seq.Matrix || '-'"></td>
                                                                </tr>
                                                                <tr class="hover:bg-zinc-800/30 transition-colors">
                                                                    <td class="px-4 py-2.5 text-zinc-500">FOV</td>
                                                                    <td class="px-4 py-2.5 text-zinc-300"
                                                                        x-text="seq.FOV || '-'"></td>
                                                                </tr>
                                                                <tr class="hover:bg-zinc-800/30 transition-colors">
                                                                    <td class="px-4 py-2.5 text-zinc-500">Gap</td>
                                                                    <td class="px-4 py-2.5 text-zinc-300"
                                                                        x-text="seq.Gap || '-'"></td>
                                                                </tr>
                                                            </tbody>
                                                        </table>
                                                    </div>
                                                </div>
                                            </div>

                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>

                    </div>
                </div>
            </template>

            <div x-show="filteredGroups.length === 0 && !isLoading" class="text-center py-16 text-zinc-600 font-sans">
                <svg class="w-12 h-12 mx-auto text-zinc-700 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                <p>No protocols or sequences match your search.</p>
            </div>

        </div>
    </main>

</body>

</html>
